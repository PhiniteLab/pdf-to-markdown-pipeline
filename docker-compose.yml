services:
  pipeline:
    build: .
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./configs:/app/configs
    environment:
      - PYTHONPATH=/app
    entrypoint: ["python", "-m", "phinitelab_pdf_pipeline.run_pipeline"]

  test:
    build: .
    volumes:
      - ./tests:/app/tests
      - ./phinitelab_pdf_pipeline:/app/phinitelab_pdf_pipeline
      - ./configs:/app/configs
    environment:
      - PYTHONPATH=/app
    entrypoint: ["python", "-m", "pytest", "tests/", "-v"]
    profiles:
      - test

  lint:
    build: .
    volumes:
      - ./phinitelab_pdf_pipeline:/app/phinitelab_pdf_pipeline
      - ./tests:/app/tests
    environment:
      - PYTHONPATH=/app
    entrypoint: ["python", "-m", "ruff", "check", "phinitelab_pdf_pipeline/", "tests/"]
    profiles:
      - lint
