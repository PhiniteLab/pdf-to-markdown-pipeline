version: 2

updates:
  # Python (pip) — cortexmark dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps(pip):"

  # npm — VS Code extension dependencies
  - package-ecosystem: npm
    directory: /vscode-extension
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - typescript
    commit-message:
      prefix: "deps(npm):"

  # GitHub Actions — CI workflow actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(actions):"
