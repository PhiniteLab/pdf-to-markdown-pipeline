name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check scripts/ tests/

      - name: Ruff format check
        run: ruff format --check scripts/ tests/

      - name: Type check
        run: pyright scripts/

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=scripts --cov-report=term-missing --cov-fail-under=70
